name: Unity Build

on:
  push:

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          lfs: true
      - uses: game-ci/unity-builder@v2
        id: unitytest
        with:
          targetPlatform: WebGL
      - uses: actions/upload-artifact@v2
        with:
          name: BuildResult
          path: build